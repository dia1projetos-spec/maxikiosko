<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caja — Panel administrativo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <script src="../js/vendor/html5-qrcode.min.js"></script>
</head>
<body>
  <div id="admin-root"></div>

  <!-- Modal escáner QR -->
  <div id="qr-scanner-modal" class="modal-overlay">
    <div class="modal-box text-center">
      <h2>Escanear código QR</h2>
      <p style="color: var(--color-ink-soft);">Apuntá la cámara al QR del producto.</p>
      <div id="qr-reader"></div>
      <button id="qr-scanner-close" class="btn btn-outline btn-block" style="margin-top: var(--space-4);">Cancelar</button>
    </div>
  </div>

  <!-- Modal de pago -->
  <div id="payment-modal" class="modal-overlay">
    <div class="modal-box">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--space-4);">
        <h2>Finalizar venta</h2>
        <button id="payment-modal-close" class="cart-drawer__close">×</button>
      </div>

      <div class="form-group">
        <label for="payment-client">Cliente (opcional)</label>
        <select id="payment-client">
          <option value="">Sin cliente asociado</option>
        </select>
        <p class="hint" id="family-client-hint" style="display:none; color: var(--color-brick);">
          ⚠️ Este es un cliente familiar: no paga, se registrará como retiro familiar.
        </p>
      </div>

      <div class="form-group">
        <label for="sale-date">Fecha de la venta</label>
        <input type="date" id="sale-date">
        <p class="hint">Por defecto es hoy. Cambiala si necesitás cargar una venta de un día anterior.</p>
      </div>

      <div class="form-group" id="payment-method-group">
        <label>Forma de pago *</label>
        <div class="radio-group">
          <label><input type="radio" name="paymentMethod" value="efectivo" checked> Efectivo</label>
          <label><input type="radio" name="paymentMethod" value="transferencia"> Transferencia</label>
          <label><input type="radio" name="paymentMethod" value="fiado"> Fiado</label>
        </div>
      </div>

      <div class="form-group" id="cash-group">
        <label for="cash-given">¿Con cuánto paga?</label>
        <input type="number" id="cash-given" min="0" step="0.01">
        <p class="hint" id="change-hint"></p>
      </div>

      <div class="form-group" id="joint-group" style="display:none;">
        <label><input type="checkbox" id="joint-checkbox" style="width:auto;"> ¿Es una compra conjunta?</label>
        <div id="joint-clients-wrap" style="display:none; margin-top: var(--space-3);">
          <label>Seleccioná los clientes que participan (el monto se divide en partes iguales):</label>
          <div id="joint-clients-list" style="max-height:160px; overflow-y:auto; border:1px solid var(--color-line); border-radius:8px; padding: var(--space-2);"></div>
        </div>
      </div>

      <div class="pos-ticket__total" style="margin-bottom: var(--space-4);">
        <span>Total</span>
        <span id="payment-total">$0,00</span>
      </div>

      <button id="confirm-sale-btn" class="btn btn-primary btn-block">Confirmar venta</button>
    </div>
  </div>

  <script type="module" src="js/caja.js"></script>
</body>
</html>
